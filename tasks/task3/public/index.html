<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather App</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container">
    <div class="weather-card" role="region" aria-label="Weather card">
      <form id="searchForm" class="search-row"> <label class="search-input" for="regionInput" aria-hidden="true"> <svg
            width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M21 21l-4.35-4.35" stroke="#0f172a" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
            <circle cx="11" cy="11" r="6" stroke="#0f172a" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg> <input id="regionInput" name="input" type="search" placeholder="Enter county or region"
            aria-label="Search region" /> </label> <button id="searchBtn" class="btn" type="submit">Search</button>
      </form>
      <div id="cardBody">
      </div>
    </div>
  </div>
  <script src="./js/main.js"></script>
</body>

</html>
